# Copy to `config.toml` and fill in. `config.toml` is gitignored (it holds secrets).
# Override the path with the AMBIENT_ST_CONFIG env var.

# "imperial" (°F, inHg, mph, in) or "metric" (°C, hPa, km/h, mm).
unit_system = "imperial"

[ambient]
# From https://ambientweather.net account -> account settings -> API keys.
application_key = "your-ambient-application-key"
api_key = "your-ambient-api-key"
mac_address = "AA:BB:CC:DD:EE:FF"

[poll]
# REST poll interval (seconds). Realtime push (Phase 5) makes this a fallback.
interval_secs = 60

# Optional: enable the EcoFlow source. Omit this whole section to disable it
# (the poll loop then never touches EcoFlow).
# [ecoflow]
# # From https://developer.ecoflow.com -> your app's IoT Open API credentials.
# access_key = "your-ecoflow-access-key"
# secret_key = "your-ecoflow-secret-key"
# # Device serial numbers to poll. Leave empty/omit to auto-discover them from
# # the device-list endpoint at each poll.
# device_sns = ["R331ZEB4ZEAL0001"]
# # base_url = "https://api-e.ecoflow.com"   # default (US/global host)

# Optional: enable Dyson sources (local MQTT push). Each [[dyson]] block is ONE
# device — repeat the block for multiple fans/purifiers. Omit them all to disable
# Dyson (no MQTT tasks spawned). This is a PUSH source: no poll interval — it
# emits observations as the device sends them.
# [[dyson]]
# host = "192.168.2.133"
# port = 1883                            # 1883 plaintext (most models); 8883 = TLS
# tls = false                            # set true for 8883 / TLS-only models
# # From the device's setup sticker. `serial` and `product_type` are parsed from
# # the SSID, and the MQTT credential is derived locally as
# # base64(SHA-512(wifi_password)) — no Dyson cloud round-trip.
# ssid = "DYSON-XXX-XX-XXXXXXXX-XXX"
# wifi_password = "..."
# # Optional explicit overrides if the sticker SSID is unavailable. Any of these
# # takes precedence over the value derived from `ssid` / `wifi_password`:
# # serial = "..."
# # product_type = "438"                 # e.g. 438 = Pure Cool
# # credential = "..."                   # the already-derived MQTT password

# Optional: enable the SmartThings sink. Omit this whole section to just log.
# [smartthings]
# token_store = "token_store.json"           # where OAuth tokens are persisted
# # base_url = "https://api.smartthings.com" # default
# #
# # Quick 24h smoke test: set a Personal Access Token and skip [smartthings.oauth].
# # access_token = "your-24h-personal-access-token"
#
# # Durable auth (recommended): register an app via `smartthings apps:create`,
# # then run `cargo run -- auth` once to authorize and store refreshable tokens.
# [smartthings.oauth]
# client_id = "your-client-id"
# client_secret = "your-client-secret"
# redirect_uri = "https://localhost/callback"
# scopes = ["r:devices:*", "w:devices:*", "x:devices:*"]
#
# # Declare devices by name + the entities they carry, then run
# # `cargo run -- provision` to self-create them (ids saved to device_store.json).
# # Bind temperature-like classes (temperature / feels_like / dew_point) to
# # *separate* devices — they share SmartThings' single `temperature` attribute.
# [[smartthings.devices]]
# name = "Outdoor Weather"
# # device_id = "..."   # optional: use an existing device instead of provisioning
# entities = [
#   "ambient_weather.outdoor.temperature",
#   "ambient_weather.outdoor.humidity",
# ]
